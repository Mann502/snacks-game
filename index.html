<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#ffcf4a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Snacks" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="assets/snacks-icon-192.png" />
<title>Snacks and his Big Adventure</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b1020;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: linear-gradient(#9be7ff 0%, #d6f4ff 60%, #f6e3b4 100%);
    width: 100%;
    height: 100%;
    touch-action: manipulation;
  }
  #hud {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,.35);
    font-size: 18px;
  }
  #lives { display: flex; gap: 4px; align-items: center; }
  #lives .heart {
    width: 18px; height: 18px;
    background: #ff3b5c;
    -webkit-mask: radial-gradient(circle at 30% 35%, #000 25%, transparent 26%) ,
                  radial-gradient(circle at 70% 35%, #000 25%, transparent 26%) ,
                  linear-gradient(#000,#000);
    -webkit-mask-composite: source-over;
    clip-path: path("M9 16 L1 8 A4 4 0 0 1 9 4 A4 4 0 0 1 17 8 Z");
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(8,12,28,.55);
    backdrop-filter: blur(4px);
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    margin: 0 0 6px;
    font-size: clamp(28px, 6vw, 56px);
    letter-spacing: .5px;
    text-shadow: 0 4px 0 #5b2a00, 0 8px 24px rgba(0,0,0,.5);
    color: #ffd58a;
  }
  #overlay p { margin: 4px 0; opacity: .9; }
  #overlay button {
    margin-top: 16px;
    padding: 14px 28px;
    border: 0;
    border-radius: 999px;
    background: #ffcf4a;
    color: #2a1700;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 0 #b48a14, 0 10px 24px rgba(0,0,0,.35);
  }
  #overlay button:active { transform: translateY(2px); box-shadow: 0 4px 0 #b48a14; }
  .small { font-size: 14px; opacity: .8; }
  #mute {
    pointer-events: auto;
    background: rgba(0,0,0,0.35);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
    align-self: center;
  }
  #mute:active { transform: translateY(1px); }
  #bossBanner {
    position: absolute;
    top: 26%;
    left: 50%;
    transform: translateX(-50%) scale(0.85);
    background: rgba(220, 30, 60, 0.94);
    color: #fff;
    font-weight: 900;
    font-size: clamp(20px, 5vw, 36px);
    padding: 10px 22px;
    border-radius: 10px;
    letter-spacing: 2px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.45);
    box-shadow: 0 8px 30px rgba(0,0,0,0.45);
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s ease-out, transform .2s ease-out;
    white-space: nowrap;
  }
  #bossBanner.show {
    opacity: 1;
    transform: translateX(-50%) scale(1);
    animation: bossPulse .35s ease-in-out infinite alternate;
  }
  @keyframes bossPulse {
    from { transform: translateX(-50%) scale(1); }
    to   { transform: translateX(-50%) scale(1.06); }
  }
  #best { font-weight: 700; }
  #hudCenter {
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
    margin: 0 8px;
  }
  #hudButtons {
    pointer-events: auto;
    display: flex;
    gap: 6px;
    justify-content: center;
  }
  #hudButtons button {
    background: rgba(0,0,0,0.35);
    color: #fff;
    border: 0;
    border-radius: 999px;
    padding: 6px 14px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  #hudButtons button:active { transform: translateY(1px); }
  #powerBadges {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: none;
  }
  .powerBadge {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #fff;
    background: rgba(0,0,0,0.55);
    padding: 4px 10px;
    border-radius: 999px;
    text-shadow: 0 1px 1px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .powerBadge.shield { border-color: rgba(255,222,140,0.7); }
  .powerBadge.magnet { border-color: rgba(120,220,255,0.7); }
  .powerBadge.turbo  { border-color: rgba(255,180,90,0.7); }
  #pauseOverlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(8,12,28,0.55);
    backdrop-filter: blur(4px);
    z-index: 5;
  }
  #pauseOverlay.show { display: flex; }
  #pauseOverlay h2 {
    margin: 0 0 12px;
    font-size: clamp(28px, 6vw, 48px);
    color: #ffd58a;
    text-shadow: 0 4px 0 #5b2a00;
  }
  #pauseOverlay button {
    margin-top: 4px;
    padding: 12px 26px;
    border: 0;
    border-radius: 999px;
    background: #ffcf4a;
    color: #2a1700;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 6px 0 #b48a14;
  }
  #pauseOverlay button:active { transform: translateY(2px); box-shadow: 0 4px 0 #b48a14; }
  #overlay .buttonRow {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }
  #overlay .buttonRow button { margin-top: 0; }
  #overlay button.secondary {
    background: rgba(255,255,255,0.92);
    color: #2a1700;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25), 0 10px 24px rgba(0,0,0,0.3);
  }
  #toast {
    position: absolute;
    left: 50%;
    bottom: 12%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.78);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    z-index: 6;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="hudCenter">
        <div id="hudButtons">
          <button id="pauseBtn" type="button" aria-label="Pause">Pause</button>
          <button id="mute" type="button" aria-label="Toggle sound">Sound on</button>
        </div>
        <div id="powerBadges"></div>
      </div>
      <div id="lives" aria-label="lives"></div>
    </div>
    <div id="bossBanner">BIRDS INCOMING!</div>
    <div id="pauseOverlay">
      <h2>Paused</h2>
      <button id="resumeBtn" type="button">Resume</button>
    </div>
    <div id="toast"></div>
    <div id="overlay">
      <h1>Snacks and his Big Adventure</h1>
      <p>Help Snacks the Cavapoo dodge bins, trees, and birds.</p>
      <p>Catch tennis balls for an extra life!</p>
      <p id="bestLine" class="small"></p>
      <p class="small">Tap / Click / Space to jump &nbsp;·&nbsp; Hold for higher jump</p>
      <div class="buttonRow">
        <button id="startBtn">Start Run</button>
        <button id="shareBtn" class="secondary" type="button" style="display:none">Share</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const muteBtn = document.getElementById('mute');
  const pauseBtn = document.getElementById('pauseBtn');
  const resumeBtn = document.getElementById('resumeBtn');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const shareBtn = document.getElementById('shareBtn');
  const toastEl = document.getElementById('toast');
  const powerBadgesEl = document.getElementById('powerBadges');
  const bossBannerEl = document.getElementById('bossBanner');
  const bestLineEl = document.getElementById('bestLine');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // World constants
  const GROUND_RATIO = 0.82;
  const GRAVITY = 2400;        // px/s^2
  const JUMP_VEL = -780;       // px/s
  const HOLD_BOOST = -1500;    // extra accel while holding
  const HOLD_TIME_MAX = 0.18;  // seconds
  const BASE_SPEED = 360;      // px/s
  const SPEED_GAIN = 6;        // px/s per second

  // Stage palettes (background, ground, accents). Snacks runs through these in order.
  const STAGES = [
    { name: 'park',  skyTop: '#9be7ff', skyBottom: '#fdf3c8', hill: '#7ec06d',
      grassTop: '#7cc14a', grassMid: '#5aa033', grassBottom: '#3a6a1f',
      dash: 'rgba(0,0,0,0.18)', sun: 'rgba(255,230,140,0.9)',
      bin: '#3a3a3f', binLid: '#1f1f23', binRib: 'rgba(255,255,255,0.15)',
      treeTrunk: '#6b3f1d', treeLeaf: '#2f7a30',
      birdBody: '#2f3a55', birdWing: '#445575', birdBeak: '#ffb627',
      stars: false, isNight: false },
    { name: 'beach', skyTop: '#fbe1a3', skyBottom: '#ffd0a0', hill: '#3aa5c5',
      grassTop: '#f1d99c', grassMid: '#dfbe7a', grassBottom: '#b48a4f',
      dash: 'rgba(255,255,255,0.45)', sun: 'rgba(255,200,120,0.95)',
      bin: '#e44b4b', binLid: '#ffffff', binRib: 'rgba(255,255,255,0.0)',
      treeTrunk: '#7a4a26', treeLeaf: '#2f9b3a',
      birdBody: '#f5f5f5', birdWing: '#9a9a9a', birdBeak: '#ffb627',
      stars: false, isNight: false },
    { name: 'night', skyTop: '#0a1230', skyBottom: '#39306a', hill: '#1a1c40',
      grassTop: '#3a3a4a', grassMid: '#252532', grassBottom: '#15151c',
      dash: 'rgba(255,220,120,0.6)', sun: 'rgba(220,220,255,0.95)',
      bin: '#ff8a1f', binLid: '#ff5a1f', binRib: 'rgba(255,255,255,0.6)',
      treeTrunk: '#3d3d44', treeLeaf: '#fff2b0',
      birdBody: '#0c0c14', birdWing: '#1a1a22', birdBeak: '#a23b3b',
      stars: true, isNight: true },
  ];
  const STAGE_LENGTH = 500; // metres per stage

  // Game state
  let running = false;
  let lastTime = 0;
  let speed = BASE_SPEED;
  let distance = 0;
  let score = 0;
  let lives = 3;
  let maxLives = 5;
  let spawnTimer = 0;
  let ballTimer = 2.0;
  let cloudTimer = 0;
  let powerupTimer = 8;        // first power-up ~8s in
  let shieldArmed = false;
  let shieldT = 0;             // remaining seconds before shield expires unused
  let magnetT = 0;
  let turboT = 0;
  let paused = false;
  let lastUpdateScore = 0;

  // Stage / boss state
  let currentStage = 0;
  let prevStage = 0;
  let stageBlend = 1;          // 1 = fully on currentStage, 0 = fully on prevStage
  let bossActive = false;
  let bossPhase = '';          // 'alert' | 'wave' | 'cooldown'
  let bossT = 0;
  let bossSpawnQueue = [];     // upcoming boss-bird spawns: [{at, y}]
  let starField = [];          // pre-generated stars for night stage

  // Polish state
  let bestScore = +(localStorage.getItem('snacks.best') || 0);
  let muted = localStorage.getItem('snacks.muted') === '1';
  let shakeAmp = 0;
  let audioCtx = null;
  let masterGain = null;

  // Snacks sprite (loaded async)
  const snacksImg = new Image();
  let snacksImgReady = false;
  snacksImg.onload = () => { snacksImgReady = true; };
  snacksImg.src = 'assets/snacks.png';

  const SNACKS_H = 76;
  const SNACKS_ASPECT = 320 / 312; // matches assets/snacks.png
  const snacks = {
    x: 0, y: 0,
    w: Math.round(SNACKS_H * SNACKS_ASPECT), h: SNACKS_H,
    vy: 0,
    onGround: true,
    holdTime: 0,
    holding: false,
    hurtFlash: 0,
    runFrame: 0,
  };

  const obstacles = []; // {type, x, y, w, h}
  const balls = [];     // {x, y, r, vy, t}
  const powerups = [];  // {type:'shield'|'magnet'|'turbo', x, y, r, t}
  const clouds = [];    // {x, y, s}
  const particles = [];

  function groundY() { return H * GROUND_RATIO; }

  // ---- Audio (lazy WebAudio synth, no asset files) ----
  function ensureAudio() {
    if (audioCtx) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return;
    }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.6;
    masterGain.connect(audioCtx.destination);
  }
  function blip(type, freqStart, freqEnd, dur, peak = 0.3) {
    if (!audioCtx || muted) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freqStart, t0);
    osc.frequency.exponentialRampToValueAtTime(Math.max(40, freqEnd), t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(peak, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(masterGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }
  function noiseBurst(dur, peak = 0.4, cutoff = 1200) {
    if (!audioCtx || muted) return;
    const t0 = audioCtx.currentTime;
    const buf = audioCtx.createBuffer(1, Math.ceil(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = cutoff;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(peak, t0);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt).connect(gain).connect(masterGain);
    src.start(t0);
  }
  function playJump()       { blip('sine',     320, 640, 0.10, 0.22); }
  function playCatch()      {
    blip('triangle', 523, 523, 0.07, 0.25);
    setTimeout(() => blip('triangle', 659, 659, 0.07, 0.22), 60);
    setTimeout(() => blip('triangle', 784, 784, 0.10, 0.22), 120);
  }
  function playHit()        { noiseBurst(0.22, 0.45, 800); blip('sawtooth', 180, 60, 0.18, 0.18); }
  function playGameOver()   {
    blip('sawtooth', 440, 440, 0.18, 0.25);
    setTimeout(() => blip('sawtooth', 370, 370, 0.22, 0.22), 180);
    setTimeout(() => blip('sawtooth', 277, 200, 0.45, 0.22), 380);
  }
  function playBossAlert()  {
    blip('square', 660, 660, 0.12, 0.22);
    setTimeout(() => blip('square', 880, 880, 0.12, 0.22), 140);
    setTimeout(() => blip('square', 660, 660, 0.12, 0.22), 280);
  }
  function playPowerup() {
    blip('triangle', 660, 660, 0.06, 0.22);
    setTimeout(() => blip('triangle', 880, 880, 0.06, 0.22), 60);
    setTimeout(() => blip('triangle', 1175, 1175, 0.10, 0.22), 120);
    setTimeout(() => blip('triangle', 1568, 1568, 0.14, 0.20), 200);
  }
  function playShieldBreak() {
    noiseBurst(0.16, 0.30, 1600);
    blip('triangle', 880, 440, 0.20, 0.22);
  }

  // ---- Haptics ----
  function vibe(pattern) {
    try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}
  }

  // ---- Screen shake ----
  function addShake(amp) { if (amp > shakeAmp) shakeAmp = amp; }

  // ---- Mute toggle ----
  function setMuted(v) {
    muted = v;
    localStorage.setItem('snacks.muted', v ? '1' : '0');
    if (masterGain) masterGain.gain.value = v ? 0 : 0.6;
    muteBtn.textContent = v ? 'Sound off' : 'Sound on';
  }
  muteBtn.textContent = muted ? 'Sound off' : 'Sound on';
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    ensureAudio();
    setMuted(!muted);
  });

  // ---- Pause ----
  function setPaused(v) {
    if (paused === v) return;
    paused = v;
    if (paused) {
      pauseOverlay.classList.add('show');
      pauseBtn.textContent = 'Resume';
    } else {
      pauseOverlay.classList.remove('show');
      pauseBtn.textContent = 'Pause';
      lastTime = performance.now();   // avoid a giant dt on resume
    }
  }
  function togglePause() { if (running) setPaused(!paused); }
  pauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });
  resumeBtn.addEventListener('click', (e) => { e.stopPropagation(); setPaused(false); });
  document.addEventListener('visibilitychange', () => { if (document.hidden && running) setPaused(true); });

  // ---- Toast ----
  let toastTimer = null;
  function flashToast(msg, ms = 1500) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
  }

  // ---- Share ----
  shareBtn.addEventListener('click', async (e) => {
    e.stopPropagation();
    const text = `Snacks ran ${Math.floor(distance)} m and scored ${score} in his Big Adventure!`;
    const url = location.href;
    try {
      if (navigator.share) {
        await navigator.share({ title: 'Snacks and his Big Adventure', text, url });
      } else if (navigator.clipboard) {
        await navigator.clipboard.writeText(`${text} ${url}`);
        flashToast('Copied to clipboard!');
      } else {
        flashToast(text);
      }
    } catch (_) { /* user cancelled or unsupported — silent */ }
  });

  // ---- Power-up HUD badges (cached to avoid DOM thrash) ----
  let lastBadgeSig = '';
  function updatePowerBadges() {
    const sig = `${shieldArmed ? 1 : 0}|${Math.ceil(shieldT)}|${Math.ceil(magnetT)}|${Math.ceil(turboT)}`;
    if (sig === lastBadgeSig) return;
    lastBadgeSig = sig;
    const items = [];
    if (shieldArmed) items.push({ cls: 'shield', label: shieldT > 0 ? `Shield ${Math.ceil(shieldT)}s` : 'Shield' });
    if (magnetT > 0) items.push({ cls: 'magnet', label: `Magnet ${Math.ceil(magnetT)}s` });
    if (turboT  > 0) items.push({ cls: 'turbo',  label: `Turbo ${Math.ceil(turboT)}s` });
    powerBadgesEl.innerHTML = '';
    for (const it of items) {
      const b = document.createElement('span');
      b.className = `powerBadge ${it.cls}`;
      b.textContent = it.label;
      powerBadgesEl.appendChild(b);
    }
  }

  // ---- Color blend for stage transitions (RGB or rgba()) ----
  function parseColor(c) {
    if (c.startsWith('#')) {
      const h = c.slice(1);
      const n = parseInt(h.length === 3 ? h.split('').map(x => x + x).join('') : h, 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255, 1];
    }
    const m = c.match(/rgba?\(([^)]+)\)/);
    if (m) {
      const parts = m[1].split(',').map(s => parseFloat(s.trim()));
      return [parts[0] | 0, parts[1] | 0, parts[2] | 0, parts.length > 3 ? parts[3] : 1];
    }
    return [255, 255, 255, 1];
  }
  function lerpColor(a, b, t) {
    const ca = parseColor(a), cb = parseColor(b);
    const r = Math.round(ca[0] + (cb[0] - ca[0]) * t);
    const g = Math.round(ca[1] + (cb[1] - ca[1]) * t);
    const bl = Math.round(ca[2] + (cb[2] - ca[2]) * t);
    const al = ca[3] + (cb[3] - ca[3]) * t;
    return `rgba(${r},${g},${bl},${al})`;
  }
  // Convenience: pick palette field with crossfade
  function pal(field) {
    const cur = STAGES[currentStage][field];
    if (stageBlend >= 1 || prevStage === currentStage) return cur;
    return lerpColor(STAGES[prevStage][field], cur, stageBlend);
  }

  // Pre-generate a star field (used in night stage)
  function regenStars() {
    starField = [];
    for (let i = 0; i < 60; i++) {
      starField.push({
        x: Math.random() * W,
        y: Math.random() * (H * 0.55),
        r: Math.random() * 1.4 + 0.3,
        a: 0.4 + Math.random() * 0.6,
      });
    }
  }
  regenStars();
  window.addEventListener('resize', regenStars);

  function reset() {
    ensureAudio();
    running = true;
    lastTime = performance.now();
    speed = BASE_SPEED;
    distance = 0;
    score = 0;
    lives = 3;
    spawnTimer = 0.6;
    ballTimer = 3.0;
    cloudTimer = 0;
    powerupTimer = 8;
    shieldArmed = false;
    shieldT = 0;
    magnetT = 0;
    turboT = 0;
    paused = false;
    lastUpdateScore = 0;
    pauseOverlay.classList.remove('show');
    pauseBtn.textContent = 'Pause';
    shareBtn.style.display = 'none';
    obstacles.length = 0;
    balls.length = 0;
    powerups.length = 0;
    particles.length = 0;
    clouds.length = 0;
    updatePowerBadges();
    for (let i = 0; i < 5; i++) {
      clouds.push({ x: Math.random() * W, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
    }
    snacks.x = Math.max(80, W * 0.18);
    snacks.y = groundY() - snacks.h;
    snacks.vy = 0;
    snacks.onGround = true;
    snacks.hurtFlash = 0;
    currentStage = 0;
    prevStage = 0;
    stageBlend = 1;
    bossActive = false;
    bossPhase = '';
    bossSpawnQueue.length = 0;
    bossBannerEl.classList.remove('show');
    shakeAmp = 0;
    overlay.classList.add('hidden');
    updateHUD();
  }

  function gameOver() {
    running = false;
    const prevBest = bestScore;
    const newBest = score > bestScore;
    if (newBest) {
      bestScore = score;
      try { localStorage.setItem('snacks.best', String(bestScore)); } catch (_) {}
    }
    playGameOver();
    vibe([120, 60, 120]);
    addShake(14);
    bossBannerEl.classList.remove('show');
    overlay.querySelector('h1').textContent = newBest ? 'New best!' : 'Snacks needs a nap';
    const ps = overlay.querySelectorAll('p');
    ps[0].textContent = `Final score: ${score}`;
    ps[1].textContent = `Distance: ${Math.floor(distance)} m  ·  Stage reached: ${STAGES[currentStage].name}`;
    ps[2].textContent = newBest ? `Previous best: ${prevBest}` : `Best: ${bestScore}`;
    startBtn.textContent = 'Run Again';
    shareBtn.style.display = '';
    overlay.classList.remove('hidden');
  }

  function updateHUD() {
    scoreEl.textContent = `Score: ${score}`;
    livesEl.innerHTML = '';
    for (let i = 0; i < lives; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.style.cssText = 'width:20px;height:20px;background:#ff3b5c;clip-path:path("M10 18 L1 9 A4.5 4.5 0 0 1 10 4 A4.5 4.5 0 0 1 19 9 Z");filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));';
      livesEl.appendChild(h);
    }
  }

  // Input
  function jumpStart() {
    ensureAudio();
    if (!running) return;
    if (snacks.onGround) {
      snacks.vy = JUMP_VEL;
      snacks.onGround = false;
      snacks.holding = true;
      snacks.holdTime = 0;
      playJump();
    }
  }
  function jumpEnd() { snacks.holding = false; }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (!running) { reset(); return; }
      jumpStart();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') jumpEnd();
  });
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (!running) return;
    jumpStart();
  });
  canvas.addEventListener('pointerup', jumpEnd);
  canvas.addEventListener('pointercancel', jumpEnd);
  startBtn.addEventListener('click', () => { ensureAudio(); reset(); });

  // Spawning
  function spawnObstacle() {
    const types = ['bin', 'tree', 'tree', 'bird']; // weight trees a bit
    const type = types[(Math.random() * types.length) | 0];
    const gy = groundY();
    const stage = currentStage;
    if (type === 'bin') {
      obstacles.push({ type, x: W + 40, y: gy - 52, w: 42, h: 52, stage });
    } else if (type === 'tree') {
      const h = 70 + Math.random() * 40;
      obstacles.push({ type, x: W + 40, y: gy - h, w: 50, h, stage });
    } else if (type === 'bird') {
      const altitude = gy - 120 - Math.random() * 90;
      obstacles.push({ type, x: W + 40, y: altitude, w: 54, h: 32, flap: 0, stage });
    }
  }
  function spawnBossBird(y, stage) {
    obstacles.push({ type: 'bird', x: W + 40, y, w: 54, h: 32, flap: Math.random() * 6, stage, boss: true });
  }
  function spawnBall() {
    const gy = groundY();
    const y = gy - 60 - Math.random() * 140;
    balls.push({ x: W + 40, y, r: 14, t: 0 });
  }
  function spawnPowerup() {
    const types = ['shield', 'magnet', 'turbo'];
    const type = types[(Math.random() * types.length) | 0];
    const gy = groundY();
    const y = gy - 90 - Math.random() * 130;
    powerups.push({ type, x: W + 40, y, r: 16, t: 0 });
  }

  // Collision (rect)
  function hit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function hitCircleRect(c, r) {
    const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));
    const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));
    const dx = c.x - cx, dy = c.y - cy;
    return dx * dx + dy * dy <= c.r * c.r;
  }

  function addParticles(x, y, color, n = 10) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 240,
        vy: (Math.random() - 1) * 240,
        life: 0.6 + Math.random() * 0.3,
        age: 0,
        color,
        r: 2 + Math.random() * 3,
      });
    }
  }

  // Update
  function update(dt) {
    const effSpeed = speed * (turboT > 0 ? 2 : 1);
    distance += (effSpeed * dt) / 30;
    speed += SPEED_GAIN * dt;
    score = Math.floor(distance);

    // Power-up timers
    if (shieldT > 0) {
      shieldT -= dt;
      if (shieldT <= 0) { shieldT = 0; shieldArmed = false; }
    }
    if (magnetT > 0) magnetT = Math.max(0, magnetT - dt);
    if (turboT  > 0) turboT  = Math.max(0, turboT  - dt);

    // Snacks physics
    if (snacks.holding && snacks.holdTime < HOLD_TIME_MAX) {
      snacks.vy += HOLD_BOOST * dt;
      snacks.holdTime += dt;
    }
    snacks.vy += GRAVITY * dt;
    snacks.y += snacks.vy * dt;
    const gy = groundY();
    if (snacks.y + snacks.h >= gy) {
      snacks.y = gy - snacks.h;
      snacks.vy = 0;
      snacks.onGround = true;
    }
    snacks.runFrame += dt * 12;
    if (snacks.hurtFlash > 0) snacks.hurtFlash -= dt;

    // Stage progression — trigger boss wave at each threshold crossing
    const targetStage = Math.floor(distance / STAGE_LENGTH) % STAGES.length;
    if (targetStage !== currentStage && !bossActive) {
      bossActive = true;
      bossPhase = 'alert';
      bossT = 1.1;                    // alert duration (seconds)
      bossSpawnQueue.length = 0;
      // 5 birds in a weaving pattern at varied altitudes — staggered so they
      // don't spawn on top of each other. `at` is seconds-after-wave-starts.
      const baseY = gy - 140;
      const queueStage = targetStage; // birds carry the *new* stage's skin
      const slots = [
        { at: 0.05, y: baseY },
        { at: 0.55, y: baseY - 60 },
        { at: 1.05, y: baseY },
        { at: 1.55, y: baseY - 60 },
        { at: 2.00, y: baseY - 30 },
      ];
      for (const s of slots) bossSpawnQueue.push({ at: s.at, y: s.y, stage: queueStage });
      bossBannerEl.classList.add('show');
      playBossAlert();
      vibe([40, 40, 40]);
      addShake(10);
    }
    if (bossActive) {
      bossT -= dt;
      if (bossPhase === 'alert' && bossT <= 0) {
        bossPhase = 'wave';
        bossT = 8.0;                  // generous wave window — ends early when birds clear
        prevStage = currentStage;
        currentStage = targetStage;
        stageBlend = 0;
        bossBannerEl.classList.remove('show');
      }
      if (bossPhase === 'wave') {
        for (let i = bossSpawnQueue.length - 1; i >= 0; i--) {
          const q = bossSpawnQueue[i];
          q.at -= dt;
          if (q.at <= 0) {
            spawnBossBird(q.y, q.stage);
            bossSpawnQueue.splice(i, 1);
          }
        }
        if (bossSpawnQueue.length === 0 && !obstacles.some(o => o.boss && o.x > -40)) {
          bossActive = false;
          bossPhase = '';
        } else if (bossT <= 0) {
          bossActive = false;
          bossPhase = '';
          bossSpawnQueue.length = 0;
        }
      }
    }

    // Stage crossfade always advances toward 1
    if (stageBlend < 1) stageBlend = Math.min(1, stageBlend + dt / 0.6);

    // Spawning (suppressed during boss wave)
    if (!bossActive) {
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        const minGap = Math.max(0.65, 1.4 - (speed - BASE_SPEED) / 600);
        spawnTimer = minGap + Math.random() * 0.9;
      }
    } else {
      // small grace period when wave ends before next normal obstacle
      spawnTimer = Math.max(spawnTimer, 0.6);
    }
    ballTimer -= dt;
    if (ballTimer <= 0) {
      spawnBall();
      ballTimer = 4 + Math.random() * 4;
    }
    powerupTimer -= dt;
    if (powerupTimer <= 0 && !bossActive) {
      spawnPowerup();
      powerupTimer = 14 + Math.random() * 8;
    }
    cloudTimer -= dt;
    if (cloudTimer <= 0 && !STAGES[currentStage].isNight) {
      clouds.push({ x: W + 80, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
      cloudTimer = 1.5 + Math.random() * 2.5;
    }

    // Decay screen shake
    if (shakeAmp > 0.01) shakeAmp *= Math.pow(0.001, dt); // ~halves every 100ms
    else shakeAmp = 0;

    const mouthCx = snacks.x + snacks.w * 0.72;
    const mouthCy = snacks.y + snacks.h * 0.34;

    // Move obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= effSpeed * dt;
      if (o.type === 'bird') {
        o.flap = (o.flap || 0) + dt * 14;
        o.y += Math.sin(o.flap) * 25 * dt;
      }
      if (o.x + o.w < -20) { obstacles.splice(i, 1); continue; }

      // Collision with Snacks (use a slightly inset hitbox)
      const hb = { x: snacks.x + snacks.w * 0.14, y: snacks.y + snacks.h * 0.10, w: snacks.w * 0.72, h: snacks.h * 0.85 };
      if (snacks.hurtFlash <= 0 && hit(hb, o)) {
        // Turbo: pass straight through; no damage, no flash
        if (turboT > 0) continue;
        // Shield: absorb the hit, no life lost
        if (shieldArmed) {
          shieldArmed = false;
          shieldT = 0;
          snacks.hurtFlash = 0.5;
          addParticles(snacks.x + snacks.w/2, snacks.y + snacks.h/2, '#ffe6a8', 18);
          playShieldBreak();
          vibe(45);
          addShake(5);
          updatePowerBadges();
          continue;
        }
        lives -= 1;
        snacks.hurtFlash = 1.0;
        addParticles(snacks.x + snacks.w/2, snacks.y + snacks.h/2, '#ff5566', 14);
        playHit();
        vibe(70);
        addShake(8);
        // small pushback
        speed = Math.max(BASE_SPEED, speed * 0.85);
        updateHUD();
        if (lives <= 0) { gameOver(); return; }
      }
    }

    // Move balls (with magnet pull)
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      b.x -= effSpeed * dt;
      b.t = (b.t || 0) + dt;
      if (b.x < -30) { balls.splice(i, 1); continue; }
      if (magnetT > 0) {
        const dx = mouthCx - b.x;
        const dy = mouthCy - b.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < 220 * 220) {
          const d = Math.sqrt(d2) || 1;
          const pull = 360 * dt;          // px/sec toward mouth
          b.x += (dx / d) * pull;
          b.y += (dy / d) * pull;
        }
      }
      // Collision with Snacks mouth
      const mouth = { x: snacks.x + snacks.w * 0.55, y: snacks.y + snacks.h * 0.18, w: snacks.w * 0.40, h: snacks.h * 0.32 };
      if (hitCircleRect(b, mouth)) {
        balls.splice(i, 1);
        if (lives < maxLives) lives += 1;
        score += 25;
        distance += 25;
        addParticles(b.x, b.y, '#d8ff5a', 16);
        playCatch();
        vibe(25);
        updateHUD();
      }
    }

    // Move power-ups + pickup
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      p.x -= effSpeed * dt;
      p.t = (p.t || 0) + dt;
      if (p.x < -30) { powerups.splice(i, 1); continue; }
      const mouth = { x: snacks.x + snacks.w * 0.55, y: snacks.y + snacks.h * 0.18, w: snacks.w * 0.40, h: snacks.h * 0.32 };
      if (hitCircleRect({ x: p.x, y: p.y, r: p.r }, mouth)) {
        powerups.splice(i, 1);
        if (p.type === 'shield') { shieldArmed = true; shieldT = 10; addParticles(p.x, p.y, '#ffe6a8', 18); }
        else if (p.type === 'magnet') { magnetT = 8;            addParticles(p.x, p.y, '#7adbff', 18); }
        else if (p.type === 'turbo')  { turboT  = 4;            addParticles(p.x, p.y, '#ffb46c', 22); }
        score += 50;
        distance += 50;
        playPowerup();
        vibe(35);
        updateHUD();
        updatePowerBadges();
      }
    }

    // Clouds
    for (let i = clouds.length - 1; i >= 0; i--) {
      const c = clouds[i];
      c.x -= effSpeed * dt * 0.15 * c.s;
      if (c.x < -120) clouds.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      if (p.age >= p.life) { particles.splice(i, 1); continue; }
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }

    if (score !== lastUpdateScore) {
      scoreEl.textContent = `Score: ${score}`;
      lastUpdateScore = score;
    }

    // Keep power-up badge timers fresh (cheap: only updates when seconds change)
    updatePowerBadges();
  }

  // Drawing helpers
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function drawCloud(c) {
    const x = c.x, y = c.y, s = 24 * c.s;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.arc(x + s, y - s * 0.4, s * 0.9, 0, Math.PI * 2);
    ctx.arc(x + s * 2, y, s, 0, Math.PI * 2);
    ctx.arc(x + s * 1.2, y + s * 0.3, s * 0.85, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    const gy = groundY();
    const grad = ctx.createLinearGradient(0, gy, 0, H);
    grad.addColorStop(0,    pal('grassTop'));
    grad.addColorStop(0.15, pal('grassMid'));
    grad.addColorStop(1,    pal('grassBottom'));
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, H - gy);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(0, gy, W, 2);
    ctx.fillStyle = pal('dash');
    const dashSpacing = 36;
    const offset = (distance * 1.0) % dashSpacing;
    for (let x = -offset; x < W; x += dashSpacing) {
      ctx.fillRect(x, gy + 14, 18, 3);
    }
  }

  function drawSnacks() {
    if (!snacksImgReady) return;
    const x = snacks.x, y = snacks.y, w = snacks.w, h = snacks.h;
    const flash = snacks.hurtFlash > 0 && Math.floor(snacks.hurtFlash * 10) % 2 === 0;

    // Shadow (always draw, even mid-jump, scaled by altitude)
    ctx.save();
    const groundDist = groundY() - (y + h);
    const shadowScale = Math.max(0.4, 1 - groundDist / 220);
    ctx.fillStyle = `rgba(0,0,0,${0.28 * shadowScale})`;
    ctx.beginPath();
    ctx.ellipse(x + w/2, groundY() - 2, (w/2) * shadowScale, 6 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Power-up auras (drawn under the body so they read as a glow)
    if (shieldArmed || magnetT > 0 || turboT > 0) {
      ctx.save();
      const cx = x + w / 2, cy = y + h / 2;
      const auraT = (performance.now() / 1000) * 4;
      if (shieldArmed) {
        const a = 0.45 + Math.sin(auraT) * 0.1;
        const grd = ctx.createRadialGradient(cx, cy, w * 0.35, cx, cy, w * 0.7);
        grd.addColorStop(0, `rgba(255,236,176,${a * 0.5})`);
        grd.addColorStop(1, 'rgba(255,236,176,0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(cx, cy, w * 0.7, 0, Math.PI * 2); ctx.fill();
      }
      if (magnetT > 0) {
        ctx.strokeStyle = 'rgba(120,220,255,0.55)';
        ctx.lineWidth = 1.5;
        for (let i = 0; i < 3; i++) {
          const r = w * 0.55 + Math.sin(auraT + i) * 4 + i * 6;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        }
      }
      if (turboT > 0) {
        ctx.fillStyle = 'rgba(255,180,90,0.55)';
        for (let i = 0; i < 5; i++) {
          const sx = x - 6 - i * 8 - (auraT * 30 % 16);
          const sy = y + h * (0.3 + 0.12 * i);
          ctx.fillRect(sx, sy, 12, 3);
        }
      }
      ctx.restore();
    }

    ctx.save();
    if (flash) ctx.globalAlpha = 0.45;

    // Run bob + jump tilt
    const bob  = snacks.onGround ? Math.sin(snacks.runFrame * 1.4) * 1.5 : 0;
    const tilt = snacks.onGround ? 0 : Math.max(-0.28, Math.min(0.28, snacks.vy / 1600));

    ctx.translate(x + w/2, y + h/2 + bob);
    ctx.rotate(tilt);

    // Slice the sprite to animate the legs:
    //   - top 65% (+overlap) is the body  — never moves
    //   - bottom 35% is split left/right  — alternating vertical "lift"
    // Drawn in order legs → body, so the body covers the lifted-leg seam.
    const sw = snacksImg.naturalWidth;
    const sh = snacksImg.naturalHeight;
    const split = 0.65;      // body/legs source split (0..1)
    const overlap = 0.03;    // body extends a hair into legs to hide the seam
    const dx = -w / 2;
    const dy = -h / 2;

    // Leg motion: alternating lift while running, tuck when ascending in a jump
    const phase = snacks.runFrame * 1.4;
    const liftAmp = h * 0.09;
    const tuck    = snacks.onGround ? 0 : Math.max(0, Math.min(h * 0.10, -snacks.vy / 80));
    const liftL = snacks.onGround ? Math.max(0, Math.sin(phase))             * liftAmp : tuck;
    const liftR = snacks.onGround ? Math.max(0, Math.sin(phase + Math.PI))   * liftAmp : tuck;

    // Back legs (left half of the bottom portion)
    ctx.drawImage(
      snacksImg,
      0,            sh * split,        sw * 0.5,  sh * (1 - split),
      dx,           dy + h * split - liftL,  w * 0.5,   h * (1 - split)
    );
    // Front legs (right half)
    ctx.drawImage(
      snacksImg,
      sw * 0.5,     sh * split,        sw * 0.5,  sh * (1 - split),
      dx + w * 0.5, dy + h * split - liftR,  w * 0.5,   h * (1 - split)
    );
    // Body — drawn last so it covers the lifted-leg tops cleanly
    ctx.drawImage(
      snacksImg,
      0, 0,                    sw, sh * (split + overlap),
      dx, dy,                  w,  h  * (split + overlap)
    );

    ctx.restore();
  }

  function drawBin(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const s = STAGES[o.stage || 0];
    if (s.name === 'beach') {
      // beach umbrella: pole + striped canopy
      ctx.fillStyle = '#7a4a26';
      ctx.fillRect(x + w/2 - 2, y + 14, 4, h - 14);
      // canopy - red/white stripes
      ctx.fillStyle = s.bin;
      ctx.beginPath();
      ctx.moveTo(x - 4, y + 18);
      ctx.quadraticCurveTo(x + w/2, y - 12, x + w + 4, y + 18);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = s.binLid;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(x - 4 + (i * 2 + 1) * (w + 8) / 6, y + 18);
        ctx.quadraticCurveTo(x + w/2, y + 4 - i * 2, x - 4 + (i * 2 + 2) * (w + 8) / 6, y + 18);
        ctx.fill();
      }
      // tip
      ctx.fillStyle = s.bin;
      ctx.beginPath();
      ctx.arc(x + w/2, y + 4, 3, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    if (s.name === 'night') {
      // traffic cone with reflective stripe
      ctx.fillStyle = s.bin;
      ctx.beginPath();
      ctx.moveTo(x + w/2 - 2, y);
      ctx.lineTo(x + w/2 + 2, y);
      ctx.lineTo(x + w - 4, y + h - 6);
      ctx.lineTo(x + 4, y + h - 6);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = s.binRib;
      ctx.fillRect(x + 8, y + h * 0.35, w - 16, 4);
      ctx.fillRect(x + 6, y + h * 0.55, w - 12, 4);
      // base
      ctx.fillStyle = s.binLid;
      roundRect(x, y + h - 6, w, 6, 2);
      ctx.fill();
      return;
    }
    // park (default)
    ctx.fillStyle = s.bin;
    roundRect(x + 2, y + 8, w - 4, h - 8, 4);
    ctx.fill();
    ctx.strokeStyle = s.binRib;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + 4, y + 18 + i * 10);
      ctx.lineTo(x + w - 4, y + 18 + i * 10);
      ctx.stroke();
    }
    ctx.fillStyle = s.binLid;
    roundRect(x, y, w, 10, 3);
    ctx.fill();
    roundRect(x + w/2 - 6, y - 4, 12, 5, 2);
    ctx.fill();
  }

  function drawTree(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const s = STAGES[o.stage || 0];
    if (s.name === 'beach') {
      // palm: curved trunk + 4 fronds
      ctx.strokeStyle = s.treeTrunk;
      ctx.lineWidth = 8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x + w/2, y + h);
      ctx.quadraticCurveTo(x + w/2 - 6, y + h * 0.55, x + w/2 + 4, y + 18);
      ctx.stroke();
      // fronds
      ctx.fillStyle = s.treeLeaf;
      const cx = x + w/2 + 4, cy = y + 18;
      const frondAngles = [-1.2, -0.5, 0.4, 1.3];
      for (const a of frondAngles) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(a);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(18, -6, 30, 2);
        ctx.quadraticCurveTo(18, 4, 0, 0);
        ctx.fill();
        ctx.restore();
      }
      // coconut
      ctx.fillStyle = '#5a3a1c';
      ctx.beginPath();
      ctx.arc(cx + 2, cy + 8, 3.5, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    if (s.name === 'night') {
      // lamppost with glowing lamp + halo
      ctx.fillStyle = s.treeTrunk;
      ctx.fillRect(x + w/2 - 3, y + 14, 6, h - 14);
      // base
      ctx.fillRect(x + w/2 - 8, y + h - 6, 16, 6);
      // arm
      ctx.fillRect(x + w/2 - 3, y + 14, 14, 4);
      // lamp halo
      const grd = ctx.createRadialGradient(x + w/2 + 14, y + 18, 2, x + w/2 + 14, y + 18, 22);
      grd.addColorStop(0, 'rgba(255,242,176,0.85)');
      grd.addColorStop(1, 'rgba(255,242,176,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(x + w/2 + 14, y + 18, 22, 0, Math.PI * 2);
      ctx.fill();
      // lamp bulb
      ctx.fillStyle = s.treeLeaf;
      ctx.beginPath();
      ctx.arc(x + w/2 + 14, y + 18, 5, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // park (default)
    ctx.fillStyle = s.treeTrunk;
    ctx.fillRect(x + w/2 - 5, y + h * 0.55, 10, h * 0.45);
    ctx.fillStyle = s.treeLeaf;
    ctx.beginPath();
    ctx.arc(x + w/2, y + 18, 18, 0, Math.PI * 2);
    ctx.arc(x + w/2 - 12, y + 26, 14, 0, Math.PI * 2);
    ctx.arc(x + w/2 + 12, y + 26, 14, 0, Math.PI * 2);
    ctx.arc(x + w/2, y + 32, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(x + w/2 - 6, y + 14, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBird(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const s = STAGES[o.stage || 0];
    const flap = Math.sin(o.flap || 0);
    if (s.name === 'night') {
      // bat: dark body + sharp pointed wings
      ctx.fillStyle = s.birdBody;
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h/2, w/2 - 6, h/2 - 4, 0, 0, Math.PI * 2);
      ctx.fill();
      // head
      ctx.beginPath();
      ctx.arc(x + 10, y + h/2 - 2, 7, 0, Math.PI * 2);
      ctx.fill();
      // pointed ears
      ctx.beginPath();
      ctx.moveTo(x + 6, y + h/2 - 7);
      ctx.lineTo(x + 9, y + h/2 - 14);
      ctx.lineTo(x + 12, y + h/2 - 7);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x + 12, y + h/2 - 7);
      ctx.lineTo(x + 16, y + h/2 - 12);
      ctx.lineTo(x + 18, y + h/2 - 6);
      ctx.fill();
      // sharp wing
      ctx.fillStyle = s.birdWing;
      ctx.beginPath();
      const wingTipY = y + h/2 + flap * -16;
      ctx.moveTo(x + w/2 - 4, y + h/2);
      ctx.lineTo(x + w/2 + 8, wingTipY);
      ctx.lineTo(x + w - 2, y + h/2 + 2);
      ctx.lineTo(x + w/2 + 4, y + h/2 + 4);
      ctx.closePath();
      ctx.fill();
      // glowing red eye
      ctx.fillStyle = s.birdBeak;
      ctx.beginPath();
      ctx.arc(x + 9, y + h/2 - 3, 1.5, 0, Math.PI * 2);
      ctx.fill();
      return;
    }
    // park / beach (sparrow / seagull) — same shape, palette swap
    ctx.fillStyle = s.birdBody;
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h/2, w/2 - 4, h/2 - 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 10, y + h/2 - 2, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = s.birdBeak;
    ctx.beginPath();
    ctx.moveTo(x + 2, y + h/2);
    ctx.lineTo(x - 6, y + h/2 + 2);
    ctx.lineTo(x + 2, y + h/2 + 5);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + 9, y + h/2 - 4, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + 9, y + h/2 - 4, 1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = s.birdWing;
    ctx.beginPath();
    const wingY = y + h/2 + flap * -10;
    ctx.moveTo(x + w/2 - 4, y + h/2);
    ctx.quadraticCurveTo(x + w/2 + 6, wingY, x + w - 6, y + h/2 + 2);
    ctx.quadraticCurveTo(x + w/2 + 6, y + h/2 + 6, x + w/2 - 4, y + h/2);
    ctx.fill();
    ctx.fillStyle = s.birdBody;
    ctx.beginPath();
    ctx.moveTo(x + w - 6, y + h/2);
    ctx.lineTo(x + w + 6, y + h/2 - 4);
    ctx.lineTo(x + w + 6, y + h/2 + 4);
    ctx.fill();
  }

  function drawPowerup(p) {
    const bob = Math.sin((p.t || 0) * 3) * 4;
    const x = p.x, y = p.y + bob, r = p.r;
    ctx.save();
    if (p.type === 'shield') {
      // soft halo
      const halo = ctx.createRadialGradient(x, y, 2, x, y, r + 8);
      halo.addColorStop(0, 'rgba(255,236,176,0.6)');
      halo.addColorStop(1, 'rgba(255,236,176,0)');
      ctx.fillStyle = halo;
      ctx.beginPath(); ctx.arc(x, y, r + 8, 0, Math.PI * 2); ctx.fill();
      // bone (two circles + a connecting bar)
      ctx.fillStyle = '#fff7d6';
      ctx.strokeStyle = '#7a5a14';
      ctx.lineWidth = 1.5;
      // bar
      roundRect(x - r * 0.85, y - r * 0.32, r * 1.7, r * 0.64, r * 0.32);
      ctx.fill(); ctx.stroke();
      // 4 lobes
      [[-1, -1], [-1, 1], [1, -1], [1, 1]].forEach(([sx, sy]) => {
        ctx.beginPath();
        ctx.arc(x + sx * r * 0.85, y + sy * r * 0.42, r * 0.42, 0, Math.PI * 2);
        ctx.fill(); ctx.stroke();
      });
    } else if (p.type === 'magnet') {
      // sock: striped red/white
      const sw = r * 1.3, sh = r * 1.6;
      ctx.translate(x, y);
      ctx.rotate(-0.25);
      // ankle band
      ctx.fillStyle = '#e8e8e8';
      roundRect(-sw / 2, -sh / 2, sw, sh * 0.18, 4);
      ctx.fill();
      // body stripes
      const bodyTop = -sh / 2 + sh * 0.18;
      const bodyH = sh * 0.62;
      ctx.fillStyle = '#e44b4b';
      roundRect(-sw / 2, bodyTop, sw, bodyH, 4);
      ctx.fill();
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 3; i++) {
        ctx.fillRect(-sw / 2, bodyTop + i * bodyH / 3 + bodyH / 9, sw, bodyH / 9);
      }
      // toe (foot points right)
      ctx.fillStyle = '#e44b4b';
      ctx.beginPath();
      ctx.moveTo(-sw / 2, bodyTop + bodyH);
      ctx.quadraticCurveTo(0, bodyTop + bodyH + sh * 0.3, sw, bodyTop + bodyH);
      ctx.lineTo(sw, bodyTop + bodyH - 4);
      ctx.lineTo(-sw / 2, bodyTop + bodyH - 4);
      ctx.fill();
      // outline
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 1;
      roundRect(-sw / 2, -sh / 2, sw, sh * 0.18, 4); ctx.stroke();
    } else if (p.type === 'turbo') {
      // glow
      const glow = ctx.createRadialGradient(x, y, 1, x, y, r + 10);
      glow.addColorStop(0, 'rgba(255,180,90,0.7)');
      glow.addColorStop(1, 'rgba(255,180,90,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, r + 10, 0, Math.PI * 2); ctx.fill();
      // heart-shaped treat
      ctx.fillStyle = '#ffb147';
      ctx.strokeStyle = '#7a3a10';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x, y + r * 0.55);
      ctx.bezierCurveTo(x - r * 1.1, y - r * 0.25, x - r * 0.5, y - r * 0.95, x, y - r * 0.35);
      ctx.bezierCurveTo(x + r * 0.5, y - r * 0.95, x + r * 1.1, y - r * 0.25, x, y + r * 0.55);
      ctx.fill(); ctx.stroke();
      // sparkle
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(x - r * 0.35, y - r * 0.4, r * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBall(b) {
    const grad = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, b.r);
    grad.addColorStop(0, '#f0ff8a');
    grad.addColorStop(1, '#aede2c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r, 0, Math.PI * 2);
    ctx.fill();
    // seam curves
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r - 2, -2.4, -0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r - 2, 0.7, 2.4);
    ctx.stroke();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    ctx.clearRect(0, 0, W, H);

    // Apply screen shake (transformed for the rest of the frame)
    let shakeX = 0, shakeY = 0;
    if (shakeAmp > 0.1) {
      shakeX = (Math.random() - 0.5) * shakeAmp * 2;
      shakeY = (Math.random() - 0.5) * shakeAmp * 2;
    }
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Sky gradient (stage palette, crossfaded)
    const sky = ctx.createLinearGradient(0, 0, 0, groundY());
    sky.addColorStop(0, pal('skyTop'));
    sky.addColorStop(1, pal('skyBottom'));
    ctx.fillStyle = sky;
    ctx.fillRect(-20, -20, W + 40, groundY() + 20);

    // Stars (night) — draw before sun/moon so they sit behind it
    const nightWeight = (STAGES[currentStage].isNight ? stageBlend : 0)
                      + (STAGES[prevStage].isNight ? (1 - stageBlend) : 0);
    if (nightWeight > 0.02) {
      for (const s of starField) {
        ctx.fillStyle = `rgba(255,255,255,${s.a * nightWeight})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Sun / moon
    ctx.fillStyle = pal('sun');
    ctx.beginPath();
    ctx.arc(W - 90, 90, 38, 0, Math.PI * 2);
    ctx.fill();
    if (nightWeight > 0.5) {
      // small craters on the moon
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath(); ctx.arc(W - 100, 84, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(W - 78, 100, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(W - 92, 104, 3, 0, Math.PI*2); ctx.fill();
    }

    // Clouds (skip in night for atmosphere)
    if (nightWeight < 0.6) {
      for (const c of clouds) drawCloud(c);
    }

    // Distant hills (palette-aware)
    ctx.fillStyle = pal('hill');
    const hillBase = groundY();
    ctx.beginPath();
    ctx.moveTo(0, hillBase);
    const hillOffset = (distance * 0.4) % 200;
    for (let x = -hillOffset; x <= W + 200; x += 200) {
      ctx.quadraticCurveTo(x + 100, hillBase - 70, x + 200, hillBase);
    }
    ctx.lineTo(W, hillBase);
    ctx.closePath();
    ctx.fill();

    drawGround();

    // Entities
    for (const o of obstacles) {
      if (o.type === 'bin') drawBin(o);
      else if (o.type === 'tree') drawTree(o);
      else if (o.type === 'bird') drawBird(o);
    }
    for (const b of balls) drawBall(b);
    for (const p of powerups) drawPowerup(p);
    drawParticles();
    drawSnacks();

    ctx.restore();
  }

  function loop(now) {
    requestAnimationFrame(loop);
    if (paused) { lastTime = now; render(); return; }
    if (!running) { render(); return; }
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    render();
  }

  // Initial idle render
  snacks.x = Math.max(80, W * 0.18);
  snacks.y = groundY() - snacks.h;
  for (let i = 0; i < 5; i++) {
    clouds.push({ x: Math.random() * W, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
  }
  if (bestScore > 0) bestLineEl.textContent = `Best: ${bestScore}`;
  updateHUD();
  requestAnimationFrame(loop);

  // Service worker (PWA offline + install)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
})();
</script>
</body>
</html>

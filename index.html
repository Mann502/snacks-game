<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Snacks and his Big Adventure</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0b1020;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: linear-gradient(#9be7ff 0%, #d6f4ff 60%, #f6e3b4 100%);
    width: 100%;
    height: 100%;
    touch-action: manipulation;
  }
  #hud {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,.35);
    font-size: 18px;
  }
  #lives { display: flex; gap: 4px; align-items: center; }
  #lives .heart {
    width: 18px; height: 18px;
    background: #ff3b5c;
    -webkit-mask: radial-gradient(circle at 30% 35%, #000 25%, transparent 26%) ,
                  radial-gradient(circle at 70% 35%, #000 25%, transparent 26%) ,
                  linear-gradient(#000,#000);
    -webkit-mask-composite: source-over;
    clip-path: path("M9 16 L1 8 A4 4 0 0 1 9 4 A4 4 0 0 1 17 8 Z");
    filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
  }
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: rgba(8,12,28,.55);
    backdrop-filter: blur(4px);
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h1 {
    margin: 0 0 6px;
    font-size: clamp(28px, 6vw, 56px);
    letter-spacing: .5px;
    text-shadow: 0 4px 0 #5b2a00, 0 8px 24px rgba(0,0,0,.5);
    color: #ffd58a;
  }
  #overlay p { margin: 4px 0; opacity: .9; }
  #overlay button {
    margin-top: 16px;
    padding: 14px 28px;
    border: 0;
    border-radius: 999px;
    background: #ffcf4a;
    color: #2a1700;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 6px 0 #b48a14, 0 10px 24px rgba(0,0,0,.35);
  }
  #overlay button:active { transform: translateY(2px); box-shadow: 0 4px 0 #b48a14; }
  .small { font-size: 14px; opacity: .8; }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game"></canvas>
    <div id="hud">
      <div id="score">Score: 0</div>
      <div id="lives" aria-label="lives"></div>
    </div>
    <div id="overlay">
      <h1>Snacks and his Big Adventure</h1>
      <p>Help Snacks the Cavapoo dodge bins, trees, and birds.</p>
      <p>Catch tennis balls for an extra life!</p>
      <p class="small">Tap / Click / Space to jump &nbsp;·&nbsp; Hold for higher jump</p>
      <button id="startBtn">Start Run</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const startBtn = document.getElementById('startBtn');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // World constants
  const GROUND_RATIO = 0.82;
  const GRAVITY = 2400;        // px/s^2
  const JUMP_VEL = -780;       // px/s
  const HOLD_BOOST = -1500;    // extra accel while holding
  const HOLD_TIME_MAX = 0.18;  // seconds
  const BASE_SPEED = 360;      // px/s
  const SPEED_GAIN = 6;        // px/s per second

  // Game state
  let running = false;
  let lastTime = 0;
  let speed = BASE_SPEED;
  let distance = 0;
  let score = 0;
  let lives = 3;
  let maxLives = 5;
  let spawnTimer = 0;
  let ballTimer = 2.0;
  let cloudTimer = 0;

  const snacks = {
    x: 0, y: 0,
    w: 78, h: 60,
    vy: 0,
    onGround: true,
    holdTime: 0,
    holding: false,
    hurtFlash: 0,
    runFrame: 0,
  };

  const obstacles = []; // {type, x, y, w, h}
  const balls = [];     // {x, y, r, vy, t}
  const clouds = [];    // {x, y, s}
  const particles = [];

  function groundY() { return H * GROUND_RATIO; }

  function reset() {
    running = true;
    lastTime = performance.now();
    speed = BASE_SPEED;
    distance = 0;
    score = 0;
    lives = 3;
    spawnTimer = 0.6;
    ballTimer = 3.0;
    cloudTimer = 0;
    obstacles.length = 0;
    balls.length = 0;
    particles.length = 0;
    clouds.length = 0;
    for (let i = 0; i < 5; i++) {
      clouds.push({ x: Math.random() * W, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
    }
    snacks.x = Math.max(80, W * 0.18);
    snacks.y = groundY() - snacks.h;
    snacks.vy = 0;
    snacks.onGround = true;
    snacks.hurtFlash = 0;
    overlay.classList.add('hidden');
    updateHUD();
  }

  function gameOver() {
    running = false;
    overlay.querySelector('h1').textContent = 'Snacks needs a nap';
    overlay.querySelector('p').textContent = `Final score: ${score}`;
    overlay.querySelectorAll('p')[1].textContent = `Distance: ${Math.floor(distance)} m`;
    startBtn.textContent = 'Run Again';
    overlay.classList.remove('hidden');
  }

  function updateHUD() {
    scoreEl.textContent = `Score: ${score}`;
    livesEl.innerHTML = '';
    for (let i = 0; i < lives; i++) {
      const h = document.createElement('div');
      h.className = 'heart';
      h.style.cssText = 'width:20px;height:20px;background:#ff3b5c;clip-path:path("M10 18 L1 9 A4.5 4.5 0 0 1 10 4 A4.5 4.5 0 0 1 19 9 Z");filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));';
      livesEl.appendChild(h);
    }
  }

  // Input
  function jumpStart() {
    if (!running) return;
    if (snacks.onGround) {
      snacks.vy = JUMP_VEL;
      snacks.onGround = false;
      snacks.holding = true;
      snacks.holdTime = 0;
    }
  }
  function jumpEnd() { snacks.holding = false; }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (!running) { reset(); return; }
      jumpStart();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') jumpEnd();
  });
  canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (!running) return;
    jumpStart();
  });
  canvas.addEventListener('pointerup', jumpEnd);
  canvas.addEventListener('pointercancel', jumpEnd);
  startBtn.addEventListener('click', reset);

  // Spawning
  function spawnObstacle() {
    const types = ['bin', 'tree', 'tree', 'bird']; // weight trees a bit
    const type = types[(Math.random() * types.length) | 0];
    const gy = groundY();
    if (type === 'bin') {
      obstacles.push({ type, x: W + 40, y: gy - 52, w: 42, h: 52 });
    } else if (type === 'tree') {
      const h = 70 + Math.random() * 40;
      obstacles.push({ type, x: W + 40, y: gy - h, w: 50, h });
    } else if (type === 'bird') {
      const altitude = gy - 120 - Math.random() * 90;
      obstacles.push({ type, x: W + 40, y: altitude, w: 54, h: 32, flap: 0 });
    }
  }
  function spawnBall() {
    const gy = groundY();
    const y = gy - 60 - Math.random() * 140;
    balls.push({ x: W + 40, y, r: 14, t: 0 });
  }

  // Collision (rect)
  function hit(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }
  function hitCircleRect(c, r) {
    const cx = Math.max(r.x, Math.min(c.x, r.x + r.w));
    const cy = Math.max(r.y, Math.min(c.y, r.y + r.h));
    const dx = c.x - cx, dy = c.y - cy;
    return dx * dx + dy * dy <= c.r * c.r;
  }

  function addParticles(x, y, color, n = 10) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y,
        vx: (Math.random() - 0.5) * 240,
        vy: (Math.random() - 1) * 240,
        life: 0.6 + Math.random() * 0.3,
        age: 0,
        color,
        r: 2 + Math.random() * 3,
      });
    }
  }

  // Update
  function update(dt) {
    distance += (speed * dt) / 30;
    speed += SPEED_GAIN * dt;
    score = Math.floor(distance);

    // Snacks physics
    if (snacks.holding && snacks.holdTime < HOLD_TIME_MAX) {
      snacks.vy += HOLD_BOOST * dt;
      snacks.holdTime += dt;
    }
    snacks.vy += GRAVITY * dt;
    snacks.y += snacks.vy * dt;
    const gy = groundY();
    if (snacks.y + snacks.h >= gy) {
      snacks.y = gy - snacks.h;
      snacks.vy = 0;
      snacks.onGround = true;
    }
    snacks.runFrame += dt * 12;
    if (snacks.hurtFlash > 0) snacks.hurtFlash -= dt;

    // Spawning
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnObstacle();
      const minGap = Math.max(0.65, 1.4 - (speed - BASE_SPEED) / 600);
      spawnTimer = minGap + Math.random() * 0.9;
    }
    ballTimer -= dt;
    if (ballTimer <= 0) {
      spawnBall();
      ballTimer = 4 + Math.random() * 4;
    }
    cloudTimer -= dt;
    if (cloudTimer <= 0) {
      clouds.push({ x: W + 80, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
      cloudTimer = 1.5 + Math.random() * 2.5;
    }

    // Move obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= speed * dt;
      if (o.type === 'bird') {
        o.flap = (o.flap || 0) + dt * 14;
        o.y += Math.sin(o.flap) * 25 * dt;
      }
      if (o.x + o.w < -20) { obstacles.splice(i, 1); continue; }

      // Collision with Snacks (use a slightly inset hitbox)
      const hb = { x: snacks.x + 10, y: snacks.y + 8, w: snacks.w - 20, h: snacks.h - 14 };
      if (snacks.hurtFlash <= 0 && hit(hb, o)) {
        lives -= 1;
        snacks.hurtFlash = 1.0;
        addParticles(snacks.x + snacks.w/2, snacks.y + snacks.h/2, '#ff5566', 14);
        // small pushback
        speed = Math.max(BASE_SPEED, speed * 0.85);
        updateHUD();
        if (lives <= 0) { gameOver(); return; }
      }
    }

    // Move balls
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      b.x -= speed * dt;
      b.t = (b.t || 0) + dt;
      if (b.x < -30) { balls.splice(i, 1); continue; }
      // Collision with Snacks mouth
      const mouth = { x: snacks.x + snacks.w - 18, y: snacks.y + 18, w: 22, h: 22 };
      if (hitCircleRect(b, mouth)) {
        balls.splice(i, 1);
        if (lives < maxLives) lives += 1;
        score += 25;
        distance += 25;
        addParticles(b.x, b.y, '#d8ff5a', 16);
        updateHUD();
      }
    }

    // Clouds
    for (let i = clouds.length - 1; i >= 0; i--) {
      const c = clouds[i];
      c.x -= speed * dt * 0.15 * c.s;
      if (c.x < -120) clouds.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.age += dt;
      if (p.age >= p.life) { particles.splice(i, 1); continue; }
      p.vy += 600 * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }

    if (score !== +scoreEl.textContent.replace(/\D/g, '')) {
      scoreEl.textContent = `Score: ${score}`;
    }
  }

  // Drawing helpers
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y,     x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x,     y + h, r);
    ctx.arcTo(x,     y + h, x,     y,     r);
    ctx.arcTo(x,     y,     x + w, y,     r);
    ctx.closePath();
  }

  function drawCloud(c) {
    const x = c.x, y = c.y, s = 24 * c.s;
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI * 2);
    ctx.arc(x + s, y - s * 0.4, s * 0.9, 0, Math.PI * 2);
    ctx.arc(x + s * 2, y, s, 0, Math.PI * 2);
    ctx.arc(x + s * 1.2, y + s * 0.3, s * 0.85, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawGround() {
    const gy = groundY();
    // grass strip
    const grad = ctx.createLinearGradient(0, gy, 0, H);
    grad.addColorStop(0, '#7cc14a');
    grad.addColorStop(0.15, '#5aa033');
    grad.addColorStop(1, '#3a6a1f');
    ctx.fillStyle = grad;
    ctx.fillRect(0, gy, W, H - gy);
    // top edge highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(0, gy, W, 2);
    // moving dashes
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    const dashSpacing = 36;
    const offset = (distance * 1.0) % dashSpacing;
    for (let x = -offset; x < W; x += dashSpacing) {
      ctx.fillRect(x, gy + 14, 18, 3);
    }
  }

  function drawSnacks() {
    const x = snacks.x, y = snacks.y, w = snacks.w, h = snacks.h;
    const flash = snacks.hurtFlash > 0 && Math.floor(snacks.hurtFlash * 10) % 2 === 0;

    ctx.save();
    if (flash) ctx.globalAlpha = 0.4;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    const groundDist = (groundY() - (y + h));
    const shadowScale = Math.max(0.4, 1 - groundDist / 220);
    ctx.beginPath();
    ctx.ellipse(x + w/2, groundY() - 2, (w/2) * shadowScale, 6 * shadowScale, 0, 0, Math.PI * 2);
    ctx.fill();

    // Tail wag
    const wag = Math.sin(snacks.runFrame) * 6;
    ctx.fillStyle = '#8a5a35';
    ctx.beginPath();
    ctx.moveTo(x + 4, y + 22);
    ctx.quadraticCurveTo(x - 14, y + 14 + wag, x - 18, y + 6 + wag);
    ctx.quadraticCurveTo(x - 6, y + 22, x + 4, y + 30);
    ctx.fill();

    // Back legs (animated when on ground)
    const legSwing = snacks.onGround ? Math.sin(snacks.runFrame * 1.4) * 8 : 0;
    ctx.fillStyle = '#7a4d2a';
    ctx.fillRect(x + 14, y + h - 18, 10, 18 + Math.max(0, legSwing));
    ctx.fillRect(x + 28, y + h - 18, 10, 18 + Math.max(0, -legSwing));
    // Front legs
    ctx.fillRect(x + 50, y + h - 18, 10, 18 + Math.max(0, -legSwing));
    ctx.fillRect(x + 62, y + h - 18, 10, 18 + Math.max(0, legSwing));

    // Body (brown, fluffy)
    ctx.fillStyle = '#9a6638';
    roundRect(x + 6, y + 18, w - 12, h - 30, 18);
    ctx.fill();

    // Belly
    ctx.fillStyle = '#c08a55';
    roundRect(x + 14, y + 32, w - 28, 16, 10);
    ctx.fill();

    // Fluffy chest
    ctx.fillStyle = '#b07c4a';
    ctx.beginPath();
    ctx.arc(x + w - 18, y + 36, 10, 0, Math.PI * 2);
    ctx.arc(x + w - 10, y + 32, 8, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = '#9a6638';
    ctx.beginPath();
    ctx.arc(x + w - 16, y + 22, 18, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    ctx.fillStyle = '#c89868';
    roundRect(x + w - 8, y + 22, 14, 12, 6);
    ctx.fill();

    // Nose
    ctx.fillStyle = '#1a1208';
    ctx.beginPath();
    ctx.arc(x + w + 5, y + 24, 3.2, 0, Math.PI * 2);
    ctx.fill();

    // Mouth (slight smile)
    ctx.strokeStyle = '#1a1208';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w - 1, y + 30);
    ctx.quadraticCurveTo(x + w + 3, y + 33, x + w + 6, y + 30);
    ctx.stroke();

    // Eye
    ctx.fillStyle = '#1a1208';
    ctx.beginPath();
    ctx.arc(x + w - 14, y + 18, 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + w - 13, y + 17, 0.9, 0, Math.PI * 2);
    ctx.fill();

    // Black ears (Cavapoo floppy ears)
    ctx.fillStyle = '#1c130a';
    // back ear
    ctx.beginPath();
    ctx.moveTo(x + w - 24, y + 8);
    ctx.quadraticCurveTo(x + w - 36, y + 26, x + w - 26, y + 34);
    ctx.quadraticCurveTo(x + w - 18, y + 22, x + w - 16, y + 10);
    ctx.fill();
    // front ear
    ctx.beginPath();
    ctx.moveTo(x + w - 8, y + 8);
    ctx.quadraticCurveTo(x + w + 4, y + 24, x + w - 2, y + 32);
    ctx.quadraticCurveTo(x + w - 6, y + 22, x + w - 8, y + 10);
    ctx.fill();

    // Curly hair tuft
    ctx.fillStyle = '#7a4d2a';
    ctx.beginPath();
    ctx.arc(x + w - 18, y + 8, 4, 0, Math.PI * 2);
    ctx.arc(x + w - 14, y + 5, 3.5, 0, Math.PI * 2);
    ctx.arc(x + w - 10, y + 8, 3.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBin(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    // body
    ctx.fillStyle = '#3a3a3f';
    roundRect(x + 2, y + 8, w - 4, h - 8, 4);
    ctx.fill();
    // ribs
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + 4, y + 18 + i * 10);
      ctx.lineTo(x + w - 4, y + 18 + i * 10);
      ctx.stroke();
    }
    // lid
    ctx.fillStyle = '#1f1f23';
    roundRect(x, y, w, 10, 3);
    ctx.fill();
    // handle
    ctx.fillStyle = '#1f1f23';
    roundRect(x + w/2 - 6, y - 4, 12, 5, 2);
    ctx.fill();
  }

  function drawTree(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    // trunk
    ctx.fillStyle = '#6b3f1d';
    ctx.fillRect(x + w/2 - 5, y + h * 0.55, 10, h * 0.45);
    // foliage
    ctx.fillStyle = '#2f7a30';
    ctx.beginPath();
    ctx.arc(x + w/2, y + 18, 18, 0, Math.PI * 2);
    ctx.arc(x + w/2 - 12, y + 26, 14, 0, Math.PI * 2);
    ctx.arc(x + w/2 + 12, y + 26, 14, 0, Math.PI * 2);
    ctx.arc(x + w/2, y + 32, 16, 0, Math.PI * 2);
    ctx.fill();
    // highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath();
    ctx.arc(x + w/2 - 6, y + 14, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBird(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const flap = Math.sin(o.flap || 0);
    // body
    ctx.fillStyle = '#2f3a55';
    ctx.beginPath();
    ctx.ellipse(x + w/2, y + h/2, w/2 - 4, h/2 - 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.arc(x + 10, y + h/2 - 2, 8, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#ffb627';
    ctx.beginPath();
    ctx.moveTo(x + 2, y + h/2);
    ctx.lineTo(x - 6, y + h/2 + 2);
    ctx.lineTo(x + 2, y + h/2 + 5);
    ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x + 9, y + h/2 - 4, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(x + 9, y + h/2 - 4, 1, 0, Math.PI*2); ctx.fill();
    // wings (flap up/down)
    ctx.fillStyle = '#445575';
    ctx.beginPath();
    const wingY = y + h/2 + flap * -10;
    ctx.moveTo(x + w/2 - 4, y + h/2);
    ctx.quadraticCurveTo(x + w/2 + 6, wingY, x + w - 6, y + h/2 + 2);
    ctx.quadraticCurveTo(x + w/2 + 6, y + h/2 + 6, x + w/2 - 4, y + h/2);
    ctx.fill();
    // tail
    ctx.fillStyle = '#2f3a55';
    ctx.beginPath();
    ctx.moveTo(x + w - 6, y + h/2);
    ctx.lineTo(x + w + 6, y + h/2 - 4);
    ctx.lineTo(x + w + 6, y + h/2 + 4);
    ctx.fill();
  }

  function drawBall(b) {
    const grad = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, b.r);
    grad.addColorStop(0, '#f0ff8a');
    grad.addColorStop(1, '#aede2c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r, 0, Math.PI * 2);
    ctx.fill();
    // seam curves
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r - 2, -2.4, -0.7);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x, b.y + Math.sin((b.t || 0) * 4) * 3, b.r - 2, 0.7, 2.4);
    ctx.stroke();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = 1 - p.age / p.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function render() {
    // Sky gradient is from CSS, but we still need to clear
    ctx.clearRect(0, 0, W, H);

    // Sky gradient overlay (so canvas snapshot looks right)
    const sky = ctx.createLinearGradient(0, 0, 0, groundY());
    sky.addColorStop(0, '#9be7ff');
    sky.addColorStop(1, '#fdf3c8');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, groundY());

    // Sun
    ctx.fillStyle = 'rgba(255, 230, 140, 0.9)';
    ctx.beginPath();
    ctx.arc(W - 90, 90, 38, 0, Math.PI * 2);
    ctx.fill();

    // Clouds
    for (const c of clouds) drawCloud(c);

    // Distant hills
    ctx.fillStyle = '#7ec06d';
    const hillBase = groundY();
    ctx.beginPath();
    ctx.moveTo(0, hillBase);
    const hillOffset = (distance * 0.4) % 200;
    for (let x = -hillOffset; x <= W + 200; x += 200) {
      ctx.quadraticCurveTo(x + 100, hillBase - 70, x + 200, hillBase);
    }
    ctx.lineTo(W, hillBase);
    ctx.closePath();
    ctx.fill();

    drawGround();

    // Entities
    for (const o of obstacles) {
      if (o.type === 'bin') drawBin(o);
      else if (o.type === 'tree') drawTree(o);
      else if (o.type === 'bird') drawBird(o);
    }
    for (const b of balls) drawBall(b);
    drawParticles();
    drawSnacks();
  }

  function loop(now) {
    requestAnimationFrame(loop);
    if (!running) { render(); return; }
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    render();
  }

  // Initial idle render
  snacks.x = Math.max(80, W * 0.18);
  snacks.y = groundY() - snacks.h;
  for (let i = 0; i < 5; i++) {
    clouds.push({ x: Math.random() * W, y: 40 + Math.random() * (H * 0.35), s: 0.4 + Math.random() * 0.6 });
  }
  updateHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
